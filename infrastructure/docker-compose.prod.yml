services:
  nginx:
    image: nginx:1.27-alpine
    container_name: housely-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - web
      - martin
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: housely-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  postgres:
    image: postgis/postgis:16-3.4
    container_name: housely-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-housely}
      POSTGRES_USER: ${POSTGRES_USER:-housely}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-housely}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: housely-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  martin:
    image: ghcr.io/maplibre/martin
    container_name: housely-martin
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-housely}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-housely}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nominatim:
    image: mediagis/nominatim:4.4
    container_name: housely-nominatim
    environment:
      PBF_URL: https://download.geofabrik.de/europe/moldova-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/europe/moldova-updates/
      NOMINATIM_PASSWORD: ${NOMINATIM_PASSWORD:?Set NOMINATIM_PASSWORD}
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
    shm_size: 1g
    restart: unless-stopped

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: housely-valhalla
    volumes:
      - valhalla_data:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/europe/moldova-latest.osm.pbf
      - use_tiles_ignore_pbf=True
      - build_elevation=False
      - build_admins=True
      - build_time_zones=True
      - server_threads=4
    restart: unless-stopped

  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-housely}/api:latest
    container_name: housely-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-housely}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-housely}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-housely}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-housely}
      - REDIS_URL=redis://redis:6379/0
      - NOMINATIM_URL=http://nominatim:8080
      - VALHALLA_URL=http://valhalla:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-housely}/web:latest
    container_name: housely-web
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_MARTIN_URL=/tiles
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nominatim_data:
  valhalla_data:
  certbot_certs:
  certbot_www:
