name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: housely_test
          POSTGRES_USER: housely
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scoring package
        run: pip install -e packages/scoring[dev]

      - name: Install API dependencies
        run: pip install -e "apps/api[dev]"

      - name: Lint
        run: cd apps/api && ruff check .

      - name: Test scoring package
        run: cd packages/scoring && pytest tests/ -v

      - name: Test API
        env:
          DATABASE_URL: postgresql+asyncpg://housely:test@localhost:5432/housely_test
          DATABASE_URL_SYNC: postgresql://housely:test@localhost:5432/housely_test
          REDIS_URL: redis://localhost:6379/0
          NOMINATIM_URL: http://localhost:8088
        run: cd apps/api && pytest tests/ -v

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: cd apps/web && pnpm install

      - name: Lint
        run: cd apps/web && pnpm lint

      - name: Type check
        run: cd apps/web && pnpm exec tsc --noEmit

      - name: Build
        run: cd apps/web && pnpm build

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test-api, lint-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t housely-api .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t housely-web .
